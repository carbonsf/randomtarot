<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Random Tarot Card</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Inline CSS to ensure background is BLACK -->
  <style>
    /* Make background black, remove margins, center the image */
    html, body {
      background-color: black;
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    /* The card image fills the viewport; object-fit: contain scales the
       picture as large as it can while keeping its aspect ratio. Letterbox
       space falls back to the black body background. 100dvh handles mobile
       Safari's collapsing URL bar. */
    img {
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      object-fit: contain;
      cursor: pointer;
      transition:
        opacity 240ms cubic-bezier(0.2, 0, 0, 1),
        transform 240ms cubic-bezier(0.2, 0, 0, 1);
      will-change: opacity, transform;
      -webkit-tap-highlight-color: transparent;
    }

    /* "The breath": card recedes and dims while the next card is drawn. */
    img.dimmed {
      opacity: 0.55;
      transform: scale(0.985);
    }

    /* "Settling": the card is at rest and cannot yet be pulled (quantum
       source is in cooldown). A slow, almost-imperceptible respiration
       via filter:brightness — no opacity change, so it never competes
       with the reveal transition. Cursor reverts so the absence of
       affordance signals the absence of readiness. */
    @keyframes settling-breath {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(0.86); }
    }
    img.settling {
      animation: settling-breath 3.4s ease-in-out infinite;
      cursor: default;
    }

    /* --- Debug overlay (temporary, for validating the randomness path) --- */
    #debug {
      position: fixed;
      top: 12px;
      left: 12px;
      max-width: min(560px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      overflow: auto;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.78);
      color: #e8f0ff;
      font: 12px / 1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      z-index: 9999;
      pointer-events: none; /* don't block taps on the card */
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      text-shadow: 0 0 2px rgba(0, 0, 0, 0.6);
    }
    @media (max-width: 520px) {
      #debug { font-size: 10.5px; padding: 10px 12px; top: 8px; left: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      img {
        transition: opacity 120ms linear;
        will-change: auto;
      }
      img.dimmed {
        transform: none;
        opacity: 0.4;
      }
      /* Drop the breath to a static dim; users opting out of motion still
         get a visible "not ready" state, just without animation. */
      img.settling {
        animation: none;
        filter: brightness(0.9);
      }
    }
  </style>
</head>
<body>
  <!-- Local image to start (RoseLilyRed.jpg must be in the same folder) -->
  <img 
    src="RoseLilyRed.jpg" 
    onclick="newPage(event)" 
    alt="Tarot Card"
  />

  <!-- Load the JavaScript AFTER the HTML so it can attach to the img -->
  <script src="Randomizer.js"></script>
</body>
</html>
