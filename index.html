<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Random Tarot Card</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Inline CSS to ensure background is BLACK -->
  <style>
    /* Make background black, remove margins, center the image */
    html, body {
      background-color: black;
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    /* The card image fills the viewport; object-fit: contain scales the
       picture as large as it can while keeping its aspect ratio. Letterbox
       space falls back to the black body background. 100dvh handles mobile
       Safari's collapsing URL bar. */
    img {
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      object-fit: contain;
      cursor: pointer;
      transition:
        opacity 240ms cubic-bezier(0.2, 0, 0, 1),
        transform 240ms cubic-bezier(0.2, 0, 0, 1);
      will-change: opacity, transform;
      -webkit-tap-highlight-color: transparent;
      /* Suppress iOS "save image" / context menu and text-selection so
         the long-press gesture stays ours. */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Long-press charge: a slow brightness pulse on the back, advertising
       that something larger is being summoned. */
    @keyframes chargePulse {
      0%, 100% { filter: brightness(1.0); }
      50%      { filter: brightness(1.18); }
    }
    img.charging {
      animation: chargePulse 700ms ease-in-out infinite;
    }

    /* Commit / auto-reshuffle: a single brightness lift + tiny scale
       settle — the deck being squared up after a shuffle. */
    @keyframes deckSettle {
      0%   { filter: brightness(1.0);  transform: scale(1.0); }
      22%  { filter: brightness(1.22); transform: scale(0.99); }
      100% { filter: brightness(1.0);  transform: scale(1.0); }
    }
    img.settling {
      animation: deckSettle 500ms cubic-bezier(0.2, 0, 0, 1);
    }

    /* "The breath": card recedes and dims while the next card is drawn.
       Slow ease-out — feels like inhaling. */
    img.dimmed {
      opacity: 0.55;
      transform: scale(0.985);
    }

    /* "Setting down": when a face-up card is tapped, the card drifts
       downward and fades out before being replaced by the back. Different
       axis (vertical, not depth), different easing (firmer ease-in-out),
       so the verb reads as "place" rather than "draw". */
    img.resetting {
      opacity: 0;
      transform: translateY(6px);
      transition:
        opacity 300ms cubic-bezier(0.4, 0, 0.6, 1),
        transform 300ms cubic-bezier(0.4, 0, 0.6, 1);
    }

    @media (prefers-reduced-motion: reduce) {
      img {
        transition: opacity 120ms linear;
        will-change: auto;
      }
      img.dimmed {
        transform: none;
        opacity: 0.4;
      }
      img.resetting {
        transform: none;
        opacity: 0;
        transition: opacity 140ms linear;
      }
      img.charging {
        animation: none;
        filter: brightness(1.12);
        transition: filter 200ms linear;
      }
      img.settling {
        animation: none;
        filter: brightness(1.0);
      }
    }
  </style>
</head>
<body>
  <!-- Local image to start (RoseLilyRed.jpg must be in the same folder).
       Pointer handlers are wired in Randomizer.js so tap vs. long-press
       can be disambiguated cleanly. -->
  <img
    src="RoseLilyRed.jpg"
    alt="Tarot Card"
  />

  <!-- Load the JavaScript AFTER the HTML so it can attach to the img -->
  <script src="Randomizer.js"></script>
</body>
</html>
