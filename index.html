<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Random Tarot Card</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Inline CSS to ensure background is BLACK -->
  <style>
    /* Make background black, remove margins, center the image */
    html, body {
      background-color: black;
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    /* The card image fills the viewport; object-fit: contain scales the
       picture as large as it can while keeping its aspect ratio. Letterbox
       space falls back to the black body background. 100dvh handles mobile
       Safari's collapsing URL bar. */
    img {
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      object-fit: contain;
      cursor: pointer;
      transition:
        opacity 240ms cubic-bezier(0.2, 0, 0, 1),
        transform 240ms cubic-bezier(0.2, 0, 0, 1);
      will-change: opacity, transform;
      -webkit-tap-highlight-color: transparent;
    }

    /* "The breath": card recedes and dims while the next card is drawn. */
    img.dimmed {
      opacity: 0.55;
      transform: scale(0.985);
    }

    @media (prefers-reduced-motion: reduce) {
      img {
        transition: opacity 120ms linear;
        will-change: auto;
      }
      img.dimmed {
        transform: none;
        opacity: 0.4;
      }
    }
  </style>
</head>
<body>
  <!-- Local image to start (RoseLilyRed.jpg must be in the same folder) -->
  <img 
    src="RoseLilyRed.jpg" 
    onclick="newPage()" 
    alt="Tarot Card"
  />

  <!-- Load the JavaScript AFTER the HTML so it can attach to the img -->
  <script src="Randomizer.js"></script>
</body>
</html>
